# Example configuration for ChEMBL kinase Ki extraction.
# Update chembl_sqlite_path to your local ChEMBL SQLite file.
chembl_sqlite_path: /path/to/chembl_34/chembl_34_sqlite/chembl_34.db

# Optional outputs (defaults shown)
output_csv_path: data/raw/chembl_human_kinase_ki_raw.csv
output_broad_csv_path: data/raw/chembl_human_kinase_broad_raw.csv
output_strict_csv_path: data/raw/chembl_human_kinase_strict_raw.csv
output_sql_path: sql/kinase_ki_extraction.sql
diagnostics_json_path: reports/01_extraction_diagnostics.json
debug_stage_dir: data/raw
kinase_targets_csv_path: data/raw/debug_kinase_targets.csv
logs_dir: logs

# Global figure palette (Nature-style manuscript consistency across scripts)
figure_palette:
  blue: "#386CB0"
  orange: "#F39C12"
  green: "#2CA25F"
  red: "#E74C3C"
  purple: "#756BB1"
  gray: "#7F8C8D"

# Script-02 curation and aggregation settings
script_02:
  input_csv_path: data/raw/chembl_human_kinase_strict_raw.csv
  curated_long_csv_path: data/interim/chembl_human_kinase_ki_curated_long.csv
  duplicate_summary_csv_path: data/interim/chembl_human_kinase_ki_duplicate_summary.csv
  kinase_counts_csv_path: data/interim/kinase_record_counts.csv
  intermediate_standardized_csv_path: data/interim/chembl_human_kinase_ki_standardized_records.csv
  endpoint_summary_csv_path: reports/02_endpoint_summary.csv
  curation_report_json_path: reports/02_curation_report.json
  logs_dir: logs
  configs_used_dir: configs_used
  endpoint_handling: error
  allowed_standard_types:
    - Ki
  min_heavy_atoms: 3

# Script-03 kinase panel and sparse matrix settings
script_03:
  input_csv_path: data/interim/chembl_human_kinase_ki_curated_regression_long.csv
  output_long_path: data/processed/chembl_human_kinase_panel_long.csv
  output_matrix_path: data/processed/chembl_human_kinase_pki_matrix.csv
  output_mask_path: data/processed/chembl_human_kinase_observation_mask.csv
  output_kinase_summary_path: data/processed/kinase_panel_summary.csv
  output_overlap_matrix_path: data/processed/kinase_compound_overlap_matrix.csv
  output_compound_summary_path: data/processed/compound_panel_summary.csv
  output_panel_report_path: reports/03_kinase_panel_report.json
  min_records_per_kinase: 200
  min_unique_compounds_per_kinase: 200
  min_kinases_per_compound: 2
  min_overlap_compounds_between_kinases: 20
  drop_singleton_compounds: true
  save_dense_matrix_copy: true



# Script-04 environment annotation settings
script_04:
  input_long_path: data/processed/chembl_human_kinase_panel_long.csv
  input_matrix_path: data/processed/chembl_human_kinase_pki_matrix.csv
  input_mask_path: data/processed/chembl_human_kinase_observation_mask.csv
  input_kinase_summary_path: data/processed/kinase_panel_summary.csv
  supplemental_metadata_path:

  output_annotated_long_path: data/processed/chembl_human_kinase_panel_annotated_long.csv
  output_compound_env_path: data/processed/compound_environment_annotations.csv
  output_kinase_env_path: data/processed/kinase_environment_annotations.csv
  output_source_env_path: data/processed/source_environment_annotations.csv
  output_pair_env_path: data/processed/pair_environment_annotations.csv
  output_activity_cliff_path: data/processed/activity_cliff_annotations.csv
  output_env_report_path: reports/04_environment_annotation_report.json

  compute_murcko_scaffolds: true
  compute_generic_murcko_scaffolds: true
  compute_rdkit_descriptors: true
  compute_scaffold_frequency_bins: true

  annotate_kinase_family_from_chembl: true
  kinase_family_fallback_to_name_matching: true

  compute_source_environments: true
  compute_document_frequency_bins: true

  compute_pairwise_activity_cliffs: true
  activity_cliff_similarity_metric: tanimoto_morgan
  morgan_radius: 2
  morgan_nbits: 2048
  activity_cliff_similarity_threshold: 0.80
  activity_cliff_delta_pki_threshold: 1.0

  save_similarity_diagnostics: true
  max_pairs_for_cliff_analysis_per_kinase: 200000

  save_config_snapshot: true

# Script-05 selectivity task generation settings
script_05:
  input_annotated_long_path: data/processed/chembl_human_kinase_panel_annotated_long.csv
  input_activity_cliff_path: data/processed/activity_cliff_annotations.csv

  output_regression_long_path: data/processed/task_multitask_regression_long.csv
  output_pairwise_selectivity_path: data/processed/task_pairwise_selectivity_regression.csv
  output_target_vs_panel_path: data/processed/task_target_vs_panel_selectivity.csv
  output_classification_path: data/processed/task_derived_classification_labels.csv
  output_task_summary_path: data/processed/task_summary_table.csv
  output_report_path: reports/05_selectivity_task_report.json

  build_multitask_regression_task: true
  build_pairwise_selectivity_task: true
  build_target_vs_panel_task: true
  build_classification_tasks: true

  min_kinases_per_compound_for_selectivity: 2
  min_offtargets_per_compound: 1

  pairwise_selectivity_mode: all_pairs
  pairwise_selectivity_min_delta_pki: 0.0
  pairwise_selectivity_save_directional_pairs: true

  target_vs_panel_reference: median_offtarget
  target_vs_panel_min_offtargets: 2

  classification_active_threshold_pki: 7.0
  classification_inactive_threshold_pki: 6.0
  classification_strong_binder_threshold_pki: 8.0
  classification_weak_binder_threshold_pki: 6.0
  selective_threshold_delta_pki: 1.0
  highly_selective_threshold_delta_pki: 2.0

  gray_zone_policy: exclude
  save_only_labeled_classification_rows: false

  include_environment_columns_in_outputs: true
  include_activity_cliff_flags_in_outputs: true

  save_config_snapshot: true

# Script-06 benchmark split generation settings
script_06:
  input_regression_long_path: data/processed/task_multitask_regression_long.csv
  input_pairwise_selectivity_path: data/processed/task_pairwise_selectivity_regression.csv
  input_target_vs_panel_path: data/processed/task_target_vs_panel_selectivity.csv
  input_classification_path: data/processed/task_derived_classification_labels.csv
  input_activity_cliff_path: data/processed/activity_cliff_annotations.csv

  output_split_manifest_path: data/splits/split_manifest.csv
  output_split_report_path: reports/06_benchmark_splits_report.json

  random_seed: 2025
  n_folds: 5

  build_random_split: true
  build_scaffold_split: true
  build_grouped_kinase_family_split: true
  build_source_environment_split: true
  build_activity_cliff_flagged_subsets: true
  build_low_data_subsets: true

  train_fraction: 0.70
  valid_fraction: 0.15
  test_fraction: 0.15

  scaffold_column_candidates:
    - murcko_scaffold
    - scaffold
    - generic_murcko_scaffold
    - generic_scaffold

  kinase_family_column_candidates:
    - kinase_family
    - kinase_family_label
    - target_family
    - broad_kinase_family

  source_environment_column_candidates:
    - source_id
    - source_description
    - doc_id
    - source_frequency_bin

  activity_cliff_column_candidates:
    - activity_cliff_flag
    - cliff_flag

  min_examples_per_group: 20
  low_data_subset_train_sizes:
    - 50
    - 100
    - 250
    - 500

  save_row_level_split_assignments: true
  save_fold_level_split_assignments: true
  save_config_snapshot: true

# Script-07 classical baseline modeling settings
script_07:
  input_regression_long_path: data/processed/task_multitask_regression_long.csv
  input_pairwise_selectivity_path: data/processed/task_pairwise_selectivity_regression.csv
  input_target_vs_panel_path: data/processed/task_target_vs_panel_selectivity.csv
  input_classification_path: data/processed/task_derived_classification_labels.csv
  input_split_manifest_path: data/splits/split_manifest.csv

  output_model_root: models/classical_baselines
  output_metrics_root: results/classical_baselines
  output_predictions_root: results/classical_baselines/predictions
  output_figures_root: figures/classical_baselines
  output_report_path: reports/07_classical_baseline_report.json

  random_seed: 2025
  n_jobs: -1

  run_multitask_regression: true
  run_pairwise_selectivity_regression: true
  run_target_vs_panel_regression: true
  run_classification_tasks: true

  descriptor_type: rdkit_2d
  use_morgan_fingerprints: true
  morgan_radius: 2
  morgan_nbits: 2048
  include_rdkit_2d_descriptors: true
  include_environment_features: false

  regression_models:
    - ridge
    - random_forest
    - extra_trees
    - xgboost
    - lightgbm
    - svm_rbf

  classification_models:
    - logistic_regression
    - random_forest_classifier
    - extra_trees_classifier
    - xgboost_classifier
    - lightgbm_classifier
    - svm_rbf_classifier

  multitask_strategy: one_model_per_kinase
  pairwise_strategy: direct_pair_regression
  target_vs_panel_strategy: direct_regression

  save_trained_models: true
  save_feature_tables: true
  save_fold_predictions: true
  save_test_predictions: true
  save_error_tables: true
  save_config_snapshot: true

  make_figures: true
  export_svg: true
  export_png: true
  export_pdf: true

  figure_style:
    font_family: Times New Roman
    bold_text: true
    output_format_primary: svg
    palette_name: nature_manuscript_palette
    dpi_png: 300

  tuning:
    use_small_grid_search: true
    cv_folds_inner: 3

